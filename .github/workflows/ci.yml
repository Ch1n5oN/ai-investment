name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements-lock.txt

      - name: Verify repository
        run: npm run check

  python-dependency-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            requirements-audit-lock.txt

      - name: Install pinned audit tooling
        run: python -m pip install --require-hashes -r requirements-audit-lock.txt

      - name: Audit the locked Python runtime closure
        run: python -m pip_audit --disable-pip --require-hashes -r requirements-lock.txt

      - name: Audit the locked Python audit-tooling closure
        run: python -m pip_audit --disable-pip --require-hashes -r requirements-audit-lock.txt
